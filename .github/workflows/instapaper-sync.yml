name: Sync Instapaper → AI Bullshit

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'  # weekly, Monday 9am UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync Instapaper bookmarks
        run: node scripts/instapaper-sync.js
        env:
          INSTAPAPER_CONSUMER_KEY: ${{ secrets.INSTAPAPER_CONSUMER_KEY }}
          INSTAPAPER_CONSUMER_SECRET: ${{ secrets.INSTAPAPER_CONSUMER_SECRET }}
          INSTAPAPER_USERNAME: ${{ secrets.INSTAPAPER_USERNAME }}
          INSTAPAPER_PASSWORD: ${{ secrets.INSTAPAPER_PASSWORD }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/garden/06-ai-bullshit/ai-bullshit.md
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          git commit -m "content: add links from Instapaper"
          git push
